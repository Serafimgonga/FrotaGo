<div class="login-container">
  <!-- Dynamic Glowing Background Blur Orbs -->
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="glow glow-3"></div>

  <div class="login-card">
    <!-- Premium Interactive Branding Header inside the Card -->
    <div class="logo-wrapper">
      <div class="logo-icon-container">
        <mat-icon class="logo-icon">directions_car</mat-icon>
      </div>
      <span class="logo-text">FrotaGo<span class="logo-dot">.</span></span>
    </div>

    <!-- Slick Glassmorphism Form Section -->
    <div class="form-section">
      <div class="form-header">
        <span class="form-subtitle">ÁREA DE ACESSO</span>
        <h1>Boas-vindas!</h1>
        <p>Insira as suas credenciais para aceder ao ERP.</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
        <!-- Modern Alert Messages -->
        <div class="alert error-alert" *ngIf="errorMessage()">
          <div class="alert-icon-wrapper">
            <mat-icon>error_outline</mat-icon>
          </div>
          <div class="alert-content">
            <span class="alert-title">Ups! Algo correu mal</span>
            <span class="alert-desc">{{ errorMessage() }}</span>
          </div>
        </div>

        <!-- Inputs Container -->
        <div class="inputs-container">
          <!-- Email Input -->
          <div class="form-group-custom">
            <label class="input-label">E-mail Corporativo</label>
            <mat-form-field appearance="outline" class="w-full">
              <mat-icon matPrefix class="input-icon">mail_outline</mat-icon>
              <input matInput type="email" formControlName="email" placeholder="nome@escola.ao" required />
            </mat-form-field>
          </div>

          <!-- Password Input -->
          <div class="form-group-custom">
            <label class="input-label">Palavra-passe</label>
            <mat-form-field appearance="outline" class="w-full">
              <mat-icon matPrefix class="input-icon">lock_outline</mat-icon>
              <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="password" placeholder="••••••••" required />
              <button type="button" mat-icon-button matSuffix (click)="hidePassword.set(!hidePassword())" class="password-toggle-btn">
                <mat-icon class="toggle-icon">{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
              </button>
            </mat-form-field>
          </div>
        </div>

        <!-- Submit Button -->
        <button mat-flat-button type="submit" class="submit-btn" [disabled]="loginForm.invalid">
          <span>Entrar na Plataforma</span>
          <mat-icon class="btn-arrow">arrow_forward</mat-icon>
        </button>

        <!-- Link to Register -->
        <div class="toggle-mode">
          <span>Novo no FrotaGo?</span>
          <a routerLink="/register" class="toggle-action-link">
            Registar Escola de Condução
            <mat-icon class="link-arrow">arrow_forward</mat-icon>
          </a>
        </div>
      </form>
    </div>
  </div>

  <!-- Minimal footer outside the main card -->
  <div class="auth-footer">
    <span>© 2026 FrotaGo ERP. Todos os direitos reservados.</span>
  </div>
</div>
